<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Funding Journey — a data-driven tool for early-stage startup founders to explore funding paths, simulate rounds, discover investors, and assess international capital." />
  <title>Funding Journey — Your Path to Growth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <canvas id="particle-canvas"></canvas>
  <div class="bg-gradient-orbs"></div>

  <div id="app">
    <!-- ===== APP SHELL (shown immediately) ===== -->
    <section class="app-shell" id="app-shell">
      <header class="top-bar">
        <div class="logo">
          <span class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
              <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" fill="url(#logo-grad2)" stroke="rgba(79,70,229,0.3)"
                stroke-width="1" />
              <path d="M14 8L20 11V17L14 20L8 17V11L14 8Z" fill="white" fill-opacity="0.9" />
              <defs>
                <linearGradient id="logo-grad2" x1="2" y1="2" x2="26" y2="26">
                  <stop stop-color="#4F46E5" />
                  <stop offset="1" stop-color="#818CF8" />
                </linearGradient>
              </defs>
            </svg>
          </span>
          <span class="logo-text">FundingJourney</span>
        </div>
        <nav class="tab-nav" role="tablist">
          <button class="tab-btn active" role="tab" data-tab="typical-paths" aria-selected="true">
            <span class="tab-icon">📊</span> Typical Paths
          </button>
          <button class="tab-btn" role="tab" data-tab="path-simulator" aria-selected="false">
            <span class="tab-icon">🛤️</span> Path Simulator
          </button>
          <button class="tab-btn" role="tab" data-tab="key-investors" aria-selected="false">
            <span class="tab-icon">👥</span> Typical Investors
          </button>
          <button class="tab-btn" role="tab" data-tab="intl-capital" aria-selected="false">
            <span class="tab-icon">🌍</span> International Capital
          </button>
        </nav>
      </header>

      <div class="main-layout">
        <main class="content-area" role="tabpanel">
          <div id="tab-content" class="tab-content"></div>
        </main>

        <aside class="coach-panel">
          <div class="coach-inner">
            <div class="coach-header">
              <div class="coach-avatar">
                <div class="avatar-ring"></div>
                <div class="avatar-img">J</div>
              </div>
              <div class="coach-info">
                <h3 class="coach-name">Jessica</h3>
                <span class="coach-title">Incubator Coach</span>
              </div>
              <div class="coach-status">
                <span class="status-dot"></span>
                Online
              </div>
            </div>
            <div class="coach-messages" id="coach-messages">
              <div class="coach-bubble">
                <p id="coach-text">Hey, I am Jessica your personal Incubator expert....</p>
                <span class="bubble-time">Just now</span>
              </div>
            </div>
            <div class="coach-input-area">
              <input type="text" class="coach-input" placeholder="Enter your message..." disabled />
              <button class="coach-send" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 2L11 13" />
                  <path d="M22 2L15 22L11 13L2 9L22 2Z" />
                </svg>
              </button>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
